<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Marathon Data Entry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Copse&family=Noto+Sans+KR:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="tokens.css">
    <style>
      body {
        max-width: 600px;
        margin: 32px auto;
        padding: 24px;
        background-color: var(--md-sys-color-surface-container-low);
      }
      h2 {
        font-family: var(--md-font-display);
        color: var(--md-sys-color-on-surface);
        margin-bottom: 24px;
      }
      .form-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
        color: var(--md-sys-color-on-surface-variant);
        font-size: var(--md-typescale-label-large-size);
      }
      input {
        width: 100%;
        padding: 10px 14px;
        box-sizing: border-box;
        border: 1px solid var(--md-sys-color-outline);
        border-radius: var(--md-shape-extra-small);
        background-color: var(--md-sys-color-surface-container-highest);
        color: var(--md-sys-color-on-surface);
        font-family: var(--md-font-body);
        font-size: var(--md-typescale-body-large-size);
        outline: none;
        transition: border-color 0.15s;
      }
      input:focus {
        border-color: var(--md-sys-color-primary);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--md-sys-color-primary) 20%, transparent);
      }
      button[type=submit] {
        padding: 10px 28px;
        background-color: var(--md-sys-color-primary);
        color: var(--md-sys-color-on-primary);
        border: none;
        border-radius: var(--md-shape-full);
        font-family: var(--md-font-body);
        font-size: var(--md-typescale-label-large-size);
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      button[type=submit]:hover {
        opacity: 0.88;
      }
      #message {
        margin-top: 12px;
        color: var(--md-sys-color-secondary);
        font-weight: 500;
      }
      #error {
        margin-top: 12px;
        color: var(--md-sys-color-error);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <h2>Marathon Data Entry</h2>
    <form id="marathonForm">
      <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="date1">Date:</label>
        <input type="date" id="date1" name="date1" required>
      </div>
      <div class="form-group">
        <label for="location">Location:</label>
        <input type="text" id="location" name="location" required>
      </div>
      <div class="form-group">
        <label for="course">Course:</label>
        <input type="text" id="course" name="course" required>
      </div>
      <button type="submit">Submit</button>
    </form>
    <div id="message"></div>
    <div id="error"></div>

    <script>
      document.getElementById('marathonForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // 폼 데이터 수집
        const data = {
          name: document.getElementById('name').value,
          date1: document.getElementById('date1').value,
          location: document.getElementById('location').value,
          course: document.getElementById('course').value
        };

        // GAS 웹 앱 URL로 POST 요청
        fetch('https://script.google.com/macros/s/AKfycbzQ2xAXf3yVenIgaKuUMME-6bANxXWoOB-rf8DW8rKRFigmSDZ_GMgDda6eJBlsjk0W/exec', { // GAS 웹 앱 URL 입력
          method: 'POST',
          mode: 'cors', // CORS 모드 명시
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        })
        .then(response => {
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          return response.json();
        })
        .then(result => {
          if (result.status === 'success') {
            document.getElementById('message').innerText = result.message;
            document.getElementById('error').innerText = '';
            document.getElementById('marathonForm').reset();
          } else {
            document.getElementById('error').innerText = result.message;
            document.getElementById('message').innerText = '';
          }
        })
        .catch(error => {
          document.getElementById('error').innerText = 'Error: ' + error.message;
          document.getElementById('message').innerText = '';
        });
      });
    </script>
  </body>
</html>
